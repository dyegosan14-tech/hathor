<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" fill="none">
  <!-- Background -->
  <rect width="280" height="130" rx="8" fill="#0F4A32"/>

  <!-- Logo mark on left: knot + location pin -->
  <g transform="translate(28, 30)">
    <!-- Knot symbol -->
    <g stroke="#F4F0E6" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M35 8 C 22 8 12 18 12 31 C 12 44 35 70 35 70 C 35 70 58 44 58 31 C 58 18 48 8 35 8 Z"/>
      <circle cx="28" cy="29" r="4.5"/>
      <circle cx="42" cy="29" r="4.5"/>
    </g>
    <!-- Location pin overlay -->
    <g transform="translate(48, 52)">
      <circle r="14" fill="#0F4A32"/>
      <circle r="12" fill="#C6A15B"/>
      <path d="M0 -6 C -4 -6 -7 -3 -7 1 C -7 6 0 12 0 12 C 0 12 7 6 7 1 C 7 -3 4 -6 0 -6 Z M0 -2 C -1.5 -2 -3 -0.5 -3 1 C -3 2.5 -1.5 4 0 4 C 1.5 4 3 2.5 3 1 C 3 -0.5 1.5 -2 0 -2 Z" fill="#0F4A32"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(108, 38)">
    <text x="0" y="34" font-family="Fraunces, Georgia, serif" font-size="38" font-weight="500" fill="#F4F0E6" letter-spacing="-0.5">Hathor</text>
    <text x="1" y="60" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#C6A15B" letter-spacing="4">TRADING</text>
  </g>
</svg>